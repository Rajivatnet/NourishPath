services:
  - type: web
    name: nourishpath
    runtime: node
    plan: free
    buildCommand: npm --prefix client ci --include=dev && npm --prefix server ci && npm --prefix client run build
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-5-mini
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
